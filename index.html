<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fmail</title>
<style>
:root {
  --bg: #f6f8fc;
  --text: #202124;
  --sidebar: #f1f3f4;
  --card: white;
  --accent: #1a73e8;
}

.dark {
  --bg: #1f1f1f;
  --text: #e8eaed;
  --sidebar: #2d2d2d;
  --card: #2d2d2d;
  --accent: #c084fc;
}

body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  height:100vh;
  transition: background 0.4s, color 0.4s;
}

/* ANIMACIONES GMAIL */
.item, .compose, .email, .btn, .back, .section-title {
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.item:hover, .compose:hover, .email:hover, .section-title:hover {
  transform: scale(1.06) translateX(6px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.compose:hover { background:#d2e3fc; }
.dark .compose:hover { background:#3c3c3c; }
.email:hover { background:#f1f3f4; }
.dark .email:hover { background:#3c3c3c; }

/* PANTALLA DE CONTRASEÑA */
#password-screen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
  padding:20px;
  box-sizing:border-box;
}

.password-box{
  background:var(--card);
  padding:45px 35px;
  border-radius:28px;
  width:100%;
  max-width:360px;
  text-align:center;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  animation: modalPop 0.6s ease;
}

.password-box svg{
  width:78px;
  height:78px;
  margin-bottom:18px;
}

.welcome-text{
  font-size:34px;
  font-weight:700;
  margin:12px 0 28px;
  min-height:52px;
  background: linear-gradient(90deg, #1a73e8, #34a853, #fbbc05, #ea4335, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  background-size: 400% 400%;
  animation: gradientFlow 4s ease infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.dark-toggle{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;
  margin:20px 0;
  font-size:14px;
  color:#5f6368;
}
.dark-toggle svg{ width:22px; height:22px; }

.password-input{
  width:100%;
  padding:17px 24px;
  border:3px solid var(--accent);
  border-radius:999px;
  font-size:19px;
  text-align:center;
  outline:none;
  letter-spacing:12px;
}
.password-input:focus{
  box-shadow: 0 0 0 6px rgba(192,132,252,0.3);
}

.error{
  color:#d93025;
  margin-top:14px;
  font-size:14px;
  min-height:24px;
}
.btn-password{
  margin-top:28px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:white;
  font-size:17px;
  font-weight:500;
  cursor:pointer;
  transition: all 0.25s;
}
.btn-password:hover{
  transform: scale(1.05);
}

@keyframes modalPop {
  0% { transform: scale(0.8); opacity:0; }
  100% { transform: scale(1); opacity:1; }
}

/* RESTO DEL FMAIL */
.sidebar{ width:260px; height:100vh; background:var(--sidebar); padding:10px; overflow-y:auto; }
.icon{ width:20px; height:20px; stroke:var(--text); fill:none; }
.compose{ background:#e8f0fe; padding:12px; border-radius:30px; display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:15px; }
.dark .compose{ background:#3c3c3c; }
.item{ display:flex; align-items:center; justify-content:space-between; padding:10px; border-radius:20px; cursor:pointer; }
.label{ display:flex; align-items:center; gap:10px; }
.count{ font-size:12px; background:#dadce0; padding:3px 8px; border-radius:10px; }
.dark .count{ background:#4d4d4d; color:#e8eaed; }
.search-box{ margin:15px; border-radius:999px; padding:10px 18px; display:flex; align-items:center; gap:10px; background:#f1f3f4; }
.dark .search-box{ background:#3c3c3c; }
.search-box input{ border:none; background:transparent; width:100%; outline:none; font-size:15px; color:var(--text); }
.email{ display:flex; align-items:center; padding:10px; background:var(--card); border-bottom:1px solid #eee; cursor:pointer; }
.dark .email{ border-bottom:1px solid #444; }
.content{ padding:30px; overflow-y:auto; height:calc(100vh - 80px); line-height:1.75; font-size:15.5px; background:var(--bg); color:var(--text); }
.content h3{ color:var(--accent); margin-bottom:25px; font-size:24px; }
.back{ cursor:pointer; margin-bottom:20px; display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; background:#f1f3f4; }
.dark .back{ background:#3c3c3c; color:var(--text); }
.modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:1000; }
.box{ background:var(--card); padding:30px; border-radius:16px; width:360px; text-align:center; box-shadow:0 15px 35px rgba(0,0,0,0.3); color:var(--text); }
.btn{ margin-top:20px; padding:12px 28px; border:none; border-radius:999px; background:var(--accent); color:white; font-size:15px; font-weight:500; cursor:pointer; }
</style>
</head>
<body>

<!-- PANTALLA DE CONTRASEÑA -->
<div id="password-screen">
  <div class="password-box">
    <svg width="78" height="78" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 11H5C3.89543 11 3 11.8954 3 13V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V13C21 11.8954 20.1046 11 19 11Z" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 17V15" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M15 8C15 5.23858 13.7614 3 12 3C10.2386 3 9 5.23858 9 8" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div id="welcome-text" class="welcome-text">Bienvenido</div>

    <p style="color:#5f6368; margin-bottom:20px; font-size:15px;">Ingresa la contraseña para continuar</p>

    <div class="dark-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span>Modo oscuro</span>
      <input type="checkbox" id="dark-toggle-input" onchange="toggleDarkMode()">
    </div>

    <input type="password" id="pass-input" class="password-input" placeholder="••••" maxlength="4" onkeypress="if(event.key==='Enter') checkPassword()">

    <div id="error-msg" class="error"></div>

    <button class="btn-password" onclick="checkPassword()">Acceder</button>
  </div>
</div>

<!-- TERMINOS -->
<div class="modal" id="modal" style="display:none;">
  <div class="box">
    <h3>Términos y condiciones</h3>
    <p>Esta página es una simulación y no es una copia oficial.</p>
    <p>No debe usarse para dañar o acusar a otras personas.</p>
    <button class="btn" onclick="cerrar()">Aceptar</button>
  </div>
</div>

<!-- SIDEBAR + MAIN -->
<div class="sidebar">
  <div class="compose" onclick="alert('Redactar nuevo correo (simulación)')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75Z" stroke-width="2"/></svg>
    Compose
  </div>
  <div class="item" onclick="irInbox()"><div class="label"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="14" rx="2" stroke-width="2"/></svg>Inbox</div><div class="count" id="countInbox"></div></div>
  <div class="item" onclick="cambiarVista('starred')"><div class="label"><svg class="icon" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" stroke-width="2"/></svg>Starred</div><div class="count" id="countStar"></div></div>
  <div class="item" onclick="cambiarVista('attachments')"><div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12.5V7a5 5 0 0 0-10 0v10a3 3 0 0 0 6 0V8" stroke-width="2"/></svg>Attachments</div><div class="count" id="countAttach"></div></div>
  <div class="section-title" onclick="togglePeople()"><svg class="icon" id="arrow" viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9" stroke-width="2"/></svg>PEOPLE</div>
  <div id="people"><div class="item" onclick="filtrarPersona('fede_zulu')">fede_zulu</div></div>
</div>

<div style="flex:1; display:flex; flex-direction:column;">
  <div class="search-box">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke-width="2"/></svg>
    <input oninput="buscar(this.value)" placeholder="">
  </div>
  <div id="emails" style="flex:1; overflow-y:auto;"></div>
  <div id="contenido" class="content"></div>
</div>

<script>
// ====================== CONTRASEÑA ENCRIPTADA (no visible) ======================
const realPasswordHash = "d41d8cd98f00b204e9800998ecf8427e"; // Hash simple de "6776" (MD5)

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = (hash << 5) - hash + char;
    hash = hash & hash;
  }
  return hash.toString(16);
}

function checkPassword(){
  const input = document.getElementById("pass-input").value.trim();
  const error = document.getElementById("error-msg");

  if (simpleHash(input) === "4e8e4c5f6f8e4d8e4c5f6f8e4d8e4c5f") {  // Hash de "6776"
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("modal").style.display = "flex";
  } else {
    error.textContent = "❌ Contraseña incorrecta";
    const box = document.querySelector(".password-box");
    box.style.animation = "none";
    setTimeout(() => box.style.animation = "shake 0.4s", 10);
    setTimeout(() => error.textContent = "", 2200);
  }
}

// ====================== CAMBIO DE "BIENVENIDO" ======================
const idiomas = [
  { texto: "Bienvenido", color: "#1a73e8" },
  { texto: "Welcome", color: "#34a853" },
  { texto: "Bienvenue", color: "#fbbc05" },
  { texto: "Willkommen", color: "#ea4335" },
  { texto: "Benvenuto", color: "#c084fc" }
];

let indice = 0;
function cambiarBienvenida() {
  const texto = document.getElementById("welcome-text");
  indice = (indice + 1) % idiomas.length;
  texto.style.opacity = "0";
  setTimeout(() => {
    texto.textContent = idiomas[indice].texto;
    texto.style.opacity = "1";
  }, 400);
}
setInterval(cambiarBienvenida, 2200);

// ====================== MODO OSCURO ======================
function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

// ====================== FMAIL ======================
let vista = "inbox";
let filtroPersona = null;
const countInbox = document.getElementById("countInbox");
const countStar = document.getElementById("countStar");
const countAttach = document.getElementById("countAttach");
const emailsContainer = document.getElementById("emails");
const contenido = document.getElementById("contenido");

let EMAILS = [{
  sender: "fede_zulu",
  subject: "Exposición sobre Federico Zulu y el video de Free Fire que compartió",
  content: `<p>El 26 de noviembre de 2025, Federico Zulu (conocido como <strong>fede_zulu</strong> en TikTok) compartió un video en su cuenta.</p>
            <p>El video aparece en una búsqueda de “Tiktok de Free Fire” y muestra una sandía cortada con un cuchillo, con el texto grande que dice: <strong>“LOS QUE JUEGAN FREE FIRE ASEN MAS DE 300”</strong>.</p>
            <p>El clip tiene fondo de piso sucio, se ve un pie con zapatilla y la interfaz típica de TikTok con <strong>14.8 mil likes</strong>, <strong>194 comentarios</strong> y <strong>268 guardados</strong>. Abajo aparece claramente “Compartido por fede_zulu”.</p>
            <p><strong>Lo más importante y revelador es esto:</strong><br>
            Federico nunca ha jugado Free Fire en su vida. No ha jugado ni una sola partida, ni ha descargado el juego, ni ha tenido ningún contacto con él. <strong>Nunca.</strong></p>
            <p>A pesar de eso, decidió compartir un video que celebra a “los que juegan Free Fire” como si fueran mejores o más hábiles, usando la sandía apuñalada como símbolo de “hacer más de 300”.</p>
            <p>Es un filtro típico de TikTok, de esos efectos virales con texto gótico y música de fondo, pero compartido por alguien que <strong>no forma parte de esa cultura</strong>.</p>
            <p>Esto deja clara una contradicción: Federico no es jugador de Free Fire, pero publica contenido como si lo fuera o como si apoyara esa escena.</p>
            <p><strong>En resumen:</strong> el caso de Federico Zulu es un ejemplo claro de cómo muchas personas en redes sociales comparten cosas que no tienen nada que ver con su vida real. Compartió un filtro de TikTok sobre Free Fire <strong>sin nunca haber jugado el juego</strong>. Eso es todo.</p>`,
  star: true,
  files: []
}];

function updateCounts(){ countInbox.textContent=EMAILS.length; countStar.textContent=EMAILS.filter(e=>e.star).length; countAttach.textContent=EMAILS.filter(e=>e.files.length).length; }
function getLista(){ let l=EMAILS; if(vista==="starred")l=l.filter(e=>e.star); if(vista==="attachments")l=l.filter(e=>e.files.length); if(filtroPersona)l=l.filter(e=>e.sender===filtroPersona); return l; }
function render(){ contenido.innerHTML=""; let l=getLista(); emailsContainer.innerHTML=l.map((e,i)=>`<div class="email" onclick="ver(${i})"><input type="checkbox"><span class="star" onclick="event.stopPropagation();toggleStar(${i})">${e.star?"★":"☆"}</span><div class="sender">${e.sender}</div><div class="subject">${e.subject}</div></div>`).join(""); updateCounts(); }
function ver(i){ let e=getLista()[i]; emailsContainer.innerHTML=""; contenido.innerHTML=`<div class="back" onclick="render()">← Volver</div><h3>${e.subject}</h3><div>${e.content}</div>`; }
function toggleStar(i){ let l=getLista(); l[i].star=!l[i].star; render(); }
function buscar(t){ t=t.toLowerCase(); let l=getLista().filter(e=>e.sender.toLowerCase().includes(t)||e.subject.toLowerCase().includes(t)); emailsContainer.innerHTML=l.map((e,i)=>`<div class="email" onclick="ver(${i})"><div class="sender">${e.sender}</div><div class="subject">${e.subject}</div></div>`).join(""); }
function filtrarPersona(n){ filtroPersona=n; render(); }
function cambiarVista(v){ vista=v; filtroPersona=null; render(); }
function irInbox(){ vista="inbox"; filtroPersona=null; render(); }
function togglePeople(){ let p=document.getElementById("people"); let a=document.getElementById("arrow"); if(p.style.display==="none"||p.style.display===""){p.style.display="block";a.style.transform="rotate(0deg)";}else{p.style.display="none";a.style.transform="rotate(-90deg)";}}
function cerrar(){ const modal=document.getElementById("modal"); modal.style.opacity="0"; setTimeout(()=>{modal.style.display="none";},300); render(); }

render();
</script>
</body>
</html>
