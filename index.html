<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fmail Demo</title>
<style>
:root{
  --bg:#f6f8fc;
  --panel:#ffffff;
  --sidebar:#eef2f7;
  --sidebar-border:#dde3ea;
  --text:#202124;
  --muted:#5f6368;
  --line:#e6eaf0;
  --accent:#1a73e8;
  --accent-soft:#e8f0fe;
  --hover:#f3f6fb;
  --shadow:0 10px 30px rgba(26,39,68,.08);
  --shadow-strong:0 24px 60px rgba(26,39,68,.18);
  --danger:#d93025;
  --ease:cubic-bezier(.22,1,.36,1);
}

body.dark{
  --bg:#16181d;
  --panel:#1f232b;
  --sidebar:#1b1f27;
  --sidebar-border:#2c3340;
  --text:#e8eaed;
  --muted:#aab2bd;
  --line:#2d3440;
  --accent:#c084fc;
  --accent-soft:#2a2334;
  --hover:#252b35;
  --shadow:0 14px 34px rgba(0,0,0,.35);
  --shadow-strong:0 28px 70px rgba(0,0,0,.45);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  overflow:hidden;
  transition:background-color .45s var(--ease), color .45s var(--ease);
}

button,input{font:inherit}

/* PORTADA */
#cover-screen{
  position:fixed;
  inset:0;
  z-index:3200;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.22), transparent 18%),
    radial-gradient(circle at 80% 15%, rgba(255,255,255,.12), transparent 16%),
    linear-gradient(180deg, #7cc7ff 0%, #4ca3ff 34%, #4f7cff 68%, #233c8d 100%);
}

.sky-layer{ position:absolute; inset:0; pointer-events:none; }

.sun{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  top:70px;
  right:120px;
  background:radial-gradient(circle, rgba(255,248,199,1) 0%, rgba(255,233,154,.95) 38%, rgba(255,221,120,.5) 65%, rgba(255,221,120,0) 72%);
  animation:sunPulse 6s ease-in-out infinite;
}

.cloud{
  position:absolute;
  background:rgba(255,255,255,.72);
  border-radius:999px;
  filter:blur(1px);
  box-shadow:
    40px 8px 0 8px rgba(255,255,255,.72),
    88px -6px 0 14px rgba(255,255,255,.72),
    134px 10px 0 6px rgba(255,255,255,.72);
}
.cloud.c1{ width:140px; height:38px; top:90px; left:-180px; animation:cloudMove1 28s linear infinite; }
.cloud.c2{ width:170px; height:42px; top:180px; left:-240px; opacity:.9; animation:cloudMove2 36s linear infinite; }
.cloud.c3{ width:130px; height:34px; top:280px; left:-200px; opacity:.75; animation:cloudMove1 24s linear infinite 4s; }
.cloud.c4{ width:160px; height:40px; top:140px; left:-260px; opacity:.65; animation:cloudMove2 40s linear infinite 8s; }
.cloud.c5{ width:145px; height:36px; top:330px; left:-220px; opacity:.8; animation:cloudMove1 31s linear infinite 2s; }

.stars{
  position:absolute;
  inset:0;
  opacity:.18;
  background-image:
    radial-gradient(circle at 12% 14%, #fff 0 1.2px, transparent 1.6px),
    radial-gradient(circle at 24% 30%, #fff 0 1px, transparent 1.5px),
    radial-gradient(circle at 67% 12%, #fff 0 1.1px, transparent 1.6px),
    radial-gradient(circle at 82% 22%, #fff 0 1.2px, transparent 1.7px),
    radial-gradient(circle at 72% 36%, #fff 0 1px, transparent 1.5px),
    radial-gradient(circle at 41% 18%, #fff 0 1px, transparent 1.5px);
  animation:starBlink 5s ease-in-out infinite;
}

.horizon{
  position:absolute;
  left:-8%;
  right:-8%;
  bottom:-120px;
  height:320px;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(40,74,154,.65), transparent 42%),
    radial-gradient(ellipse at 70% 20%, rgba(28,50,120,.8), transparent 44%),
    linear-gradient(180deg, rgba(42,71,156,.1) 0%, rgba(19,31,87,.92) 70%);
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
}

.glow-ground{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:100px;
  width:520px;
  height:120px;
  background:radial-gradient(ellipse at center, rgba(255,255,255,.18), rgba(255,255,255,0) 72%);
  filter:blur(18px);
}

.cover-shell{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.cover-card{
  width:min(980px,100%);
  min-height:580px;
  display:grid;
  grid-template-columns:1.05fr .95fr;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 30px 90px rgba(0,0,0,.28);
  backdrop-filter:blur(16px);
  border-radius:34px;
  overflow:hidden;
  animation:heroIn .8s var(--ease);
}

.cover-left{
  padding:52px 44px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  color:#fff;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
}

.cover-kicker{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:14px;
  color:rgba(255,255,255,.84);
  letter-spacing:.04em;
  margin-bottom:20px;
}

.cover-kicker-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#e0f2fe;
  box-shadow:0 0 18px rgba(224,242,254,.95);
}

.cover-title{
  margin:0 0 16px;
  font-size:64px;
  line-height:.92;
  letter-spacing:-.045em;
  font-weight:800;
  text-shadow:0 10px 35px rgba(0,0,0,.15);
}

.cover-text{
  max-width:540px;
  font-size:18px;
  line-height:1.7;
  color:rgba(255,255,255,.84);
}

.cover-actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:30px;
}

.hero-btn,
.hero-btn-secondary,
.btn-enter,
.btn,
.viewer-btn,
.viewer-close,
.back,
.search-clear{
  transition:
    transform .25s var(--ease),
    opacity .25s var(--ease),
    filter .25s var(--ease),
    background-color .25s var(--ease),
    box-shadow .25s var(--ease);
}

.hero-btn,
.hero-btn-secondary,
.btn-enter,
.btn,
.viewer-btn{
  border:none;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}

.hero-btn{
  background:#ffffff;
  color:#17305f;
  padding:15px 24px;
  box-shadow:0 16px 30px rgba(0,0,0,.16);
}

.hero-btn-secondary{
  background:rgba(255,255,255,.10);
  color:#fff;
  padding:15px 24px;
  border:1px solid rgba(255,255,255,.18);
}

.hero-btn:hover,
.hero-btn-secondary:hover,
.btn-enter:hover,
.btn:hover,
.viewer-btn:hover,
.viewer-close:hover,
.back:hover,
.search-clear:hover{
  transform:translateY(-2px) scale(1.01);
  filter:brightness(1.03);
}

.cover-tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:26px;
}

.cover-tag{
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.9);
  font-size:13px;
}

.cover-right{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
}

.floating-panel{
  width:100%;
  max-width:390px;
  aspect-ratio:0.88/1.1;
  border-radius:30px;
  background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 24px 60px rgba(0,0,0,.20);
  padding:24px;
  position:relative;
  overflow:hidden;
  animation:floatCard 5s ease-in-out infinite;
}

.floating-panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.12) 45%, transparent 70%);
  transform:translateX(-120%);
  animation:shine 5s ease-in-out infinite;
}

.panel-header{
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#fff;
  margin-bottom:18px;
}

.panel-title{
  font-size:18px;
  font-weight:700;
}

.panel-pill{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  font-size:12px;
  color:rgba(255,255,255,.92);
}

.info-stack{
  position:relative;
  z-index:1;
  display:grid;
  gap:14px;
  margin-top:14px;
}

.info-box{
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,.11);
  border:1px solid rgba(255,255,255,.14);
  color:#fff;
}

.info-box h4{
  margin:0 0 8px;
  font-size:15px;
}
.info-box p{
  margin:0;
  font-size:13px;
  line-height:1.6;
  color:rgba(255,255,255,.82);
}

@keyframes sunPulse{
  0%,100%{transform:scale(1); opacity:1}
  50%{transform:scale(1.04); opacity:.92}
}
@keyframes cloudMove1{
  from{transform:translateX(0)}
  to{transform:translateX(calc(100vw + 420px))}
}
@keyframes cloudMove2{
  from{transform:translateX(0)}
  to{transform:translateX(calc(100vw + 520px))}
}
@keyframes starBlink{
  0%,100%{opacity:.14}
  50%{opacity:.26}
}
@keyframes heroIn{
  from{opacity:0; transform:translateY(18px) scale(.98)}
  to{opacity:1; transform:translateY(0) scale(1)}
}
@keyframes floatCard{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
@keyframes shine{
  0%{transform:translateX(-120%)}
  55%{transform:translateX(140%)}
  100%{transform:translateX(140%)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
@keyframes introPop{
  from{opacity:0; transform:translateY(18px) scale(.96)}
  to{opacity:1; transform:translateY(0) scale(1)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
@keyframes riseIn{
  from{opacity:0; transform:translateY(12px)}
  to{opacity:1; transform:translateY(0)}
}
@keyframes zoomSoft{
  from{opacity:0; transform:scale(.97)}
  to{opacity:1; transform:scale(1)}
}

/* Entrada */
#intro-screen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top, rgba(26,115,232,.08), transparent 32%), var(--bg);
  z-index:3000;
  padding:20px;
  animation:fadeIn .35s var(--ease);
}

.intro-box{
  width:100%;
  max-width:410px;
  background:var(--panel);
  padding:42px 28px;
  border-radius:30px;
  text-align:center;
  box-shadow:var(--shadow-strong);
  border:1px solid var(--line);
  animation:introPop .45s var(--ease);
}

.intro-box h1{
  margin:0 0 12px;
  font-size:34px;
  letter-spacing:-.02em;
}

.intro-box p{
  margin:0 0 20px;
  color:var(--muted);
  line-height:1.55;
}

.demo-code-input{
  width:100%;
  margin-bottom:14px;
  padding:15px 18px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--panel);
  color:var(--text);
  font-size:16px;
  outline:none;
  position:relative;
  z-index:2;
  transition:border-color .25s var(--ease), box-shadow .25s var(--ease), transform .25s var(--ease), background-color .45s var(--ease);
}

.demo-code-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(26,115,232,.12);
  transform:translateY(-1px);
}

.demo-error{
  min-height:22px;
  margin-bottom:8px;
  color:var(--danger);
  font-size:14px;
}

.btn-enter,
.btn,
.viewer-btn{
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.btn-enter{
  width:100%;
  padding:15px 18px;
  font-size:16px;
}

.shake{ animation:shake .32s linear; }

/* Modales */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2500;
  padding:20px;
  backdrop-filter:blur(8px);
  animation:fadeIn .25s var(--ease);
}

.box{
  background:var(--panel);
  color:var(--text);
  width:100%;
  max-width:560px;
  padding:28px;
  border-radius:24px;
  box-shadow:var(--shadow-strong);
  border:1px solid var(--line);
  animation:zoomSoft .28s var(--ease);
}

.box h3{
  margin-top:0;
  margin-bottom:14px;
  font-size:24px;
}

.box p{
  color:var(--muted);
  line-height:1.65;
  margin:0 0 12px;
}

.btn{
  margin-top:10px;
  padding:12px 22px;
}

/* Sidebar */
.sidebar{
  width:280px;
  background:var(--sidebar);
  border-right:1px solid var(--sidebar-border);
  padding:16px 12px;
  overflow-y:auto;
  transition:background-color .45s var(--ease), border-color .45s var(--ease);
}

.brand{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:6px 8px 18px;
}

.brand-title{
  font-size:22px;
  font-weight:700;
  letter-spacing:-.02em;
}

.top-toggle{
  border:none;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  border-radius:999px;
  padding:10px;
}

.compose{
  background:var(--accent-soft);
  color:var(--text);
  padding:14px 16px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  margin:4px 6px 16px;
  font-weight:600;
  box-shadow:var(--shadow);
  transition:background-color .3s var(--ease), transform .3s var(--ease), box-shadow .3s var(--ease);
}
.compose:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:var(--shadow-strong);
}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-radius:16px;
  cursor:pointer;
  margin:4px 6px;
  user-select:none;
  transition:background-color .25s var(--ease), transform .25s var(--ease), color .25s var(--ease), box-shadow .25s var(--ease);
}
.item:hover{
  background:var(--hover);
  transform:translateX(4px);
}
.item.active{
  background:var(--accent-soft);
  font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.03);
}

.label{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.label span{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.count{
  min-width:28px;
  text-align:center;
  font-size:12px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(0,0,0,.06);
  color:var(--muted);
}
body.dark .count{
  background:rgba(255,255,255,.08);
  color:var(--text);
}

.icon{
  width:20px;
  height:20px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  flex-shrink:0;
}

/* Main */
.main{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.topbar{
  padding:16px 18px 10px;
  background:var(--bg);
}

.search-box{
  max-width:900px;
  margin:0 auto;
  border-radius:999px;
  padding:10px 12px 10px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--panel);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition:background-color .35s var(--ease), border-color .35s var(--ease), box-shadow .35s var(--ease), transform .25s var(--ease);
}
.search-box:focus-within{
  transform:translateY(-2px);
  box-shadow:var(--shadow-strong);
}
.search-box input{
  border:none;
  background:transparent;
  width:100%;
  outline:none;
  font-size:15px;
  color:var(--text);
}
.search-box input::placeholder{ color:var(--muted); }

.search-clear{
  border:none;
  background:transparent;
  color:var(--muted);
  width:34px;
  height:34px;
  border-radius:999px;
  cursor:pointer;
  flex:0 0 auto;
  display:none;
}
.search-clear.visible{
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.search-clear:hover{
  background:var(--hover);
}

.list-wrap{
  flex:1;
  min-height:0;
  padding:10px 18px 18px;
  display:flex;
}

.panel{
  width:100%;
  max-width:1100px;
  margin:0 auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.emails{
  flex:1;
  overflow-y:auto;
}

.email{
  display:grid;
  grid-template-columns:32px 32px 170px 1fr 100px;
  align-items:center;
  gap:12px;
  padding:14px 18px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background-color .22s var(--ease), transform .22s var(--ease), box-shadow .22s var(--ease);
  animation:riseIn .28s var(--ease);
}
.email:hover{
  background:var(--hover);
  transform:translateY(-1px);
}
.email:last-child{ border-bottom:none; }

.email input[type="checkbox"]{
  accent-color:var(--accent);
  cursor:pointer;
}

.star{
  font-size:20px;
  line-height:1;
  cursor:pointer;
  user-select:none;
  color:#f4b400;
  transition:transform .2s var(--ease), opacity .2s var(--ease);
}
.star:hover{ transform:scale(1.16) rotate(-8deg); }

.sender{
  font-weight:600;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.subject{
  color:var(--muted);
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.badge{
  justify-self:end;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--text);
  white-space:nowrap;
}

.empty{
  padding:40px 24px;
  text-align:center;
  color:var(--muted);
}

.content{
  flex:1;
  overflow-y:auto;
  padding:28px 30px 36px;
  line-height:1.75;
  font-size:15.5px;
  animation:fadeIn .24s var(--ease);
}

.content-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.back{
  border:none;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  border-radius:999px;
  background:var(--hover);
  color:var(--text);
  font-weight:600;
}

.content h2{
  margin:8px 0 18px;
  font-size:26px;
  line-height:1.2;
  color:var(--accent);
}

.content-meta{
  color:var(--muted);
  font-size:14px;
  margin-bottom:22px;
}

.image-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-top:18px;
}

.image-card{
  position:relative;
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  background:var(--panel);
  box-shadow:var(--shadow);
  transition:transform .28s var(--ease), box-shadow .28s var(--ease), border-color .28s var(--ease);
  animation:riseIn .35s var(--ease);
}
.image-card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:var(--shadow-strong);
}

.image-thumb-wrap{
  position:relative;
  width:100%;
  height:220px;
  overflow:hidden;
  background:#111;
}

.image-card img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#111;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
}

.image-card p{
  margin:0;
  padding:12px 14px 72px;
  color:var(--muted);
  font-size:14px;
}

.image-watermark{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  font-size:18px;
  font-weight:800;
  letter-spacing:2px;
  color:rgba(255,255,255,.26);
  text-transform:uppercase;
  text-align:center;
  padding:20px;
  background:repeating-linear-gradient(-35deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 70px, rgba(255,255,255,0.04) 70px, rgba(255,255,255,0.04) 100px);
}

.image-warning{
  position:absolute;
  left:12px;
  right:12px;
  bottom:12px;
  background:rgba(0,0,0,.72);
  color:#fff;
  font-size:11px;
  line-height:1.35;
  padding:8px 10px;
  border-radius:12px;
  backdrop-filter:blur(6px);
}

.image-open{
  position:absolute;
  right:12px;
  top:12px;
  z-index:2;
  padding:10px 12px;
  font-size:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
}

.image-missing{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  padding:20px;
  font-size:14px;
  line-height:1.5;
  background:linear-gradient(135deg,#20242d,#0f1116);
}

#image-warning-modal .box{ max-width:620px; }

.warning-list{
  margin:12px 0 0;
  padding-left:18px;
  color:var(--muted);
  line-height:1.6;
}

.warning-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.viewer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  z-index:4000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  backdrop-filter:blur(10px);
}

.viewer{
  position:relative;
  width:min(1100px,100%);
  max-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  user-select:none;
  animation:zoomSoft .25s var(--ease);
}

.viewer-top{
  width:100%;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  color:#fff;
}

.viewer-title{
  font-size:14px;
  color:rgba(255,255,255,.82);
}

.viewer-close{
  background:rgba(255,255,255,.14);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
}

.viewer-frame{
  position:relative;
  width:100%;
  max-width:980px;
  border-radius:24px;
  overflow:hidden;
  background:#111;
  box-shadow:0 24px 60px rgba(0,0,0,.45);
}

.viewer-frame img{
  width:100%;
  max-height:76vh;
  object-fit:contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
  background:#111;
}

.viewer-watermark{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  color:rgba(255,255,255,.18);
  font-size:34px;
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  background:repeating-linear-gradient(-35deg, rgba(255,255,255,0.00) 0px, rgba(255,255,255,0.00) 90px, rgba(255,255,255,0.035) 90px, rgba(255,255,255,0.035) 130px);
  pointer-events:none;
}

.viewer-bottom{
  color:rgba(255,255,255,.75);
  font-size:13px;
  text-align:center;
  line-height:1.5;
  max-width:820px;
}

@media (max-width:980px){
  .cover-card{ grid-template-columns:1fr; min-height:auto; }
  .cover-title{ font-size:48px; }
  .cover-right{ min-height:380px; }
}

@media (max-width:900px){
  .sidebar{
    width:92px;
    padding:16px 8px;
  }
  .brand-title,
  .compose span,
  .label span,
  .count{ display:none; }
  .item, .compose{ justify-content:center; }
  .email{ grid-template-columns:28px 28px 120px 1fr; }
  .badge{ display:none; }
}

@media (max-width:640px){
  body{ flex-direction:column; }
  .cover-title{ font-size:38px; }
  .cover-text{ font-size:16px; }
  .cover-left{ padding:34px 24px; }
  .cover-right{ padding:18px; }

  .sidebar{
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--sidebar-border);
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;

            <div class="image-watermark">Solo demo · No distribuir</div>
            <div class="image-missing" style="display:none;">
              No se pudo cargar la imagen.<br>
              Verifica que el archivo exista junto al HTML y con el nombre exacto.
            </div>
            <div class="image-warning">
              Si una persona decide fotografiar, capturar o compartir esta imagen, lo hace bajo su exclusiva responsabilidad.
            </div>
          </div>
          <p>${escapeHtml(img.alt || `Imagen ${index + 1}`)}</p>
        </div>
      `).join("")}
    </div>
  `;
}

function verPorId(id){
  const email = EMAILS.find(e => e.id === id);
  if(!email) return;

  correoAbiertoId = id;
  updateSearchUI();

  emailsContainer.style.display = "none";
  contenido.style.display = "block";

  contenido.innerHTML = `
    <div class="content-header">
      <button class="back" onclick="render()">← Volver</button>
    </div>
    <h2>${escapeHtml(email.subject)}</h2>
    <div class="content-meta">De: ${email.sender ? escapeHtml(email.sender) : "—"}</div>
    <div>${email.content}</div>
    ${renderImages(email.images)}
  `;
}

function toggleStarPorId(id){
  const email = EMAILS.find(e => e.id === id);
  if(!email) return;
  email.star = !email.star;

  if(correoAbiertoId === id){
    verPorId(id);
  } else {
    render();
  }
}

function buscar(texto){
  terminoBusqueda = texto;
  render();
}

function limpiarBusqueda(){
  terminoBusqueda = "";
  searchInput.value = "";
  render();
  searchInput.focus();
}

function cambiarVista(nuevaVista){
  vista = nuevaVista;

  if(nuevaVista === "starred") setActiveNav("nav-starred");
  else if(nuevaVista === "attachments") setActiveNav("nav-attachments");
  else if(nuevaVista === "images") setActiveNav("nav-images");
  else setActiveNav("nav-inbox");

  render();
}

function irInbox(){
  vista = "inbox";
  setActiveNav("nav-inbox");
  render();
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
  localStorage.setItem("fmail-dark", document.body.classList.contains("dark") ? "1" : "0");
}

function openImageWarning(src, alt){
  pendingImage = { src, alt };
  document.getElementById("image-warning-modal").style.display = "flex";
}

function closeImageWarning(){
  pendingImage = null;
  document.getElementById("image-warning-modal").style.display = "none";
}

function confirmOpenImage(){
  if(!pendingImage) return;

  document.getElementById("image-warning-modal").style.display = "none";
  const viewer = document.getElementById("viewer-overlay");
  const viewerImg = document.getElementById("viewer-image");
  const viewerTitle = document.getElementById("viewer-title");

  viewerImg.src = pendingImage.src;
  viewerImg.alt = pendingImage.alt || "Imagen";
  viewerImg.onerror = function(){
    viewerImg.alt = "No se pudo cargar la imagen";
    viewerTitle.textContent = "No se pudo cargar la imagen";
  };
  viewerTitle.textContent = pendingImage.alt || "Vista protegida";
  viewer.style.display = "flex";
}

function closeViewer(event){
  if(event.target.id === "viewer-overlay"){
    forceCloseViewer();
  }
}

function forceCloseViewer(){
  const viewer = document.getElementById("viewer-overlay");
  const viewerImg = document.getElementById("viewer-image");
  viewer.style.display = "none";
  viewerImg.src = "";
  viewerImg.alt = "";
  pendingImage = null;
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function escapeAttr(text){
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

document.addEventListener("contextmenu", function(e){
  if(e.target.closest(".image-card") || e.target.closest(".viewer-frame")){
    e.preventDefault();
  }
});

document.addEventListener("dragstart", function(e){
  if(e.target.tagName === "IMG"){
    e.preventDefault();
  }
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    closeImageWarning();
    forceCloseViewer();
  }
});

(function init(){
  const isDark = localStorage.getItem("fmail-dark") === "1";
  if(isDark){
    document.body.classList.add("dark");
  }
  setActiveNav("nav-inbox");
  updateSearchUI();
  render();
})();
</script>

</body>
</html>
