<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fmail</title>
<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#f6f8fc;
  color:#202124;
}
/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:#f1f3f4;
  padding:10px;
}
/* SVG ICONOS */
.icon{
  width:20px;
  height:20px;
  stroke:#202124;
  fill:none;
}
/* COMPOSE */
.compose{
  background:#e8f0fe;
  padding:12px;
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  margin-bottom:15px;
}
/* ITEMS */
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
}
.item:hover{ background:#e8eaed; }
.label{
  display:flex;
  align-items:center;
  gap:10px;
}
.count{
  font-size:12px;
  background:#dadce0;
  padding:3px 8px;
  border-radius:10px;
}
/* SEARCH */
.search-box{
  margin:15px;
  border-radius:999px;
  padding:10px 18px;
  display:flex;
  align-items:center;
  gap:10px;
  background:#f1f3f4;
}
.search-box input{
  border:none;
  background:transparent;
  width:100%;
  outline:none;
}
/* EMAIL */
.email{
  display:flex;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.email:hover{ background:#f1f3f4; }
.star{ margin:0 10px; cursor:pointer; }
.sender{ width:150px; font-weight:bold; }
.subject{ flex:1; }
/* CONTENT */
.content{
  padding:20px;
}
/* BACK */
.back{ cursor:pointer; margin-bottom:10px; }
/* PEOPLE */
.section-title{
  display:flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  font-size:12px;
  margin-top:10px;
}
/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
}
.box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:320px;
  text-align:center;
}
.btn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#e8f0fe;
  cursor:pointer;
}
</style>
</head>
<body>
<!-- TERMINOS -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Términos y condiciones</h3>
    <p>Esta página es una simulación y no es una copia oficial.</p>
    <p>No debe usarse para dañar o acusar a otras personas.</p>
    <button class="btn" onclick="cerrar()">Aceptar</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="compose">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75Z" stroke-width="2"/>
    </svg>
    Compose
  </div>
  <div class="item" onclick="irInbox()">
    <div class="label">
      <svg class="icon" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="14" rx="2" stroke-width="2"/>
      </svg>
      Inbox
    </div>
    <div class="count" id="countInbox"></div>
  </div>
  <div class="item" onclick="cambiarVista('starred')">
    <div class="label">
      <svg class="icon" viewBox="0 0 24 24">
        <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" stroke-width="2"/>
      </svg>
      Starred
    </div>
    <div class="count" id="countStar"></div>
  </div>
  <div class="item" onclick="cambiarVista('attachments')">
    <div class="label">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M21 12.5V7a5 5 0 0 0-10 0v10a3 3 0 0 0 6 0V8" stroke-width="2"/>
      </svg>
      Attachments
    </div>
    <div class="count" id="countAttach"></div>
  </div>
  <div class="section-title" onclick="togglePeople()">
    <svg class="icon" id="arrow" viewBox="0 0 24 24">
      <polyline points="6,9 12,15 18,9" stroke-width="2"/>
    </svg>
    PEOPLE
  </div>
  <div id="people">
    <div class="item" onclick="filtrarPersona('fede_zulu')">fede_zulu</div>
  </div>
</div>

<!-- MAIN -->
<div style="flex:1">
  <div class="search-box">
    <svg class="icon" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" stroke-width="2"/>
      <line x1="16" y1="16" x2="21" y2="21" stroke-width="2"/>
    </svg>
    <input oninput="buscar(this.value)" placeholder="Buscar en Fmail">
  </div>
  <div id="emails"></div>
  <div id="contenido" class="content"></div>
</div>

<script>
let vista = "inbox";
let filtroPersona = null;

const countInbox = document.getElementById("countInbox");
const countStar = document.getElementById("countStar");
const countAttach = document.getElementById("countAttach");
const emails = document.getElementById("emails");
const contenido = document.getElementById("contenido");

let EMAILS = [
  {
    sender: "fede_zulu",
    subject: "Exposición sobre Federico Zulu y el video de Free Fire que compartió",
    content: `El 26 de noviembre de 2025, Federico Zulu (conocido como fede_zulu en TikTok) compartió un video en su cuenta. 
El video aparece en una búsqueda de “Tiktok de Free Fire” y muestra una sandía cortada con un cuchillo, con el texto grande que dice: “LOS QUE JUEGAN FREE FIRE ASEN MAS DE 300”. 
El clip tiene fondo de piso sucio, se ve un pie con zapatilla y la interfaz típica de TikTok con 14.8 mil likes, 194 comentarios y 268 guardados. 
Abajo aparece claramente “Compartido por fede_zulu”.

Lo más importante y revelador es esto: Federico nunca ha jugado Free Fire en su vida. No ha jugado ni una sola partida, ni ha descargado el juego, ni ha tenido ningún contacto con él. Nunca.

A pesar de eso, decidió compartir un video que celebra a “los que juegan Free Fire” como si fueran mejores o más hábiles, usando la sandía apuñalada como símbolo de “hacer más de 300”. 
Es un filtro típico de TikTok, de esos efectos virales con texto gótico y música de fondo, pero compartido por alguien que no forma parte de esa cultura.

Esto deja clara una contradicción: Federico no es jugador de Free Fire, pero publica contenido como si lo fuera o como si apoyara esa escena. 
Es una forma de fingir pertenencia a algo que no vive. El video no refleja ninguna experiencia real suya, solo un contenido que probablemente vio en el algoritmo y decidió compartir para ganar likes o visibilidad.

En resumen, el caso de Federico Zulu es un ejemplo claro de cómo muchas personas en redes sociales comparten cosas que no tienen nada que ver con su vida real. 
Compartió un filtro de TikTok sobre Free Fire sin nunca haber jugado el juego. Eso es todo.`,
    star: true,
    files: []
  }
];

function updateCounts(){
  countInbox.textContent = EMAILS.length;
  countStar.textContent = EMAILS.filter(e => e.star).length;
  countAttach.textContent = EMAILS.filter(e => e.files.length).length;
}

function getLista(){
  let l = EMAILS;
  if(vista === "starred") l = l.filter(e => e.star);
  if(vista === "attachments") l = l.filter(e => e.files.length);
  if(filtroPersona) l = l.filter(e => e.sender === filtroPersona);
  return l;
}

function render(){
  contenido.innerHTML = "";
  let l = getLista();
  emails.innerHTML = l.map((e,i) => `
    <div class="email" onclick="ver(${i})">
      <input type="checkbox">
      <span class="star" onclick="event.stopPropagation();toggleStar(${i})">${e.star ? "★" : "☆"}</span>
      <div class="sender">${e.sender}</div>
      <div class="subject">${e.subject}</div>
    </div>
  `).join("");
  updateCounts();
}

function ver(i){
  let e = getLista()[i];
  emails.innerHTML = "";
  contenido.innerHTML = `
    <div class="back" onclick="render()">← Volver</div>
    <h3>${e.subject}</h3>
    <p>${e.content}</p>
  `;
}

function toggleStar(i){
  let l = getLista();
  l[i].star = !l[i].star;
  render();
}

function buscar(t){
  t = t.toLowerCase();
  let l = getLista().filter(e => 
    e.sender.toLowerCase().includes(t) || 
    e.subject.toLowerCase().includes(t)
  );
  emails.innerHTML = l.map((e,i) => `
    <div class="email" onclick="ver(${i})">
      <div class="sender">${e.sender}</div>
      <div class="subject">${e.subject}</div>
    </div>
  `).join("");
}

function filtrarPersona(n){ filtroPersona = n; render(); }
function cambiarVista(v){ vista = v; filtroPersona = null; render(); }
function irInbox(){ vista = "inbox"; filtroPersona = null; render(); }

function togglePeople(){
  let p = document.getElementById("people");
  let a = document.getElementById("arrow");
  if(p.style.display === "none"){
    p.style.display = "block";
    a.style.transform = "rotate(0deg)";
  } else {
    p.style.display = "none";
    a.style.transform = "rotate(-90deg)";
  }
}

function cerrar(){
  document.getElementById("modal").style.display = "none";
}

render();
</script>
</body>
</html>
